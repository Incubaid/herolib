apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{.Name}}
  namespace: {{.Namespace}}
  labels:
    app: {{.AppLabel}}
spec:
  replicas: {{.Replicas}}
  selector:
    matchLabels:
      app: {{.AppLabel}}
  template:
    metadata:
      labels:
        app: {{.AppLabel}}
    spec:
      containers:
      - name: {{.ContainerName}}
        image: {{.Image}}
        ports:
        - containerPort: {{.ContainerPort}}