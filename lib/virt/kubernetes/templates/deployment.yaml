apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${metadata.name}
  namespace: ${metadata.namespace}
  labels:
    app: ${metadata.name}
spec:
  replicas: ${replicas}
  selector:
    matchLabels:
      app: ${metadata.name}
  template:
    metadata:
      labels:
        app: ${metadata.name}
    spec:
      containers:
      - name: ${container.name}
        image: ${container.image}
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: ${container.port}
          name: http