[Unit]
Description=${self.description}
After=network.target
@if self.description == ''
Description=${self.name} service
@end

[Service]
Type=simple
ExecStart=${self.cmd}
WorkingDirectory=/tmp
StandardOutput=journal
StandardError=journal
@if self.restart
Restart=always
RestartSec=5
@else
Restart=no
@end
@{envs}

[Install]
WantedBy=multi-user.target
