apiVersion: v1
kind: Service
metadata:
  name: @{config_values.postgres_host}
  namespace: @{config_values.namespace}
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: nextcloud
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: nextcloud
  ports:
  - name: pg
    port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: @{config_values.postgres_host}
  namespace: @{config_values.namespace}
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: nextcloud
spec:
  serviceName: @{config_values.postgres_host}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: nextcloud
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: nextcloud
    spec:
      securityContext:
        fsGroup: 999
      containers:
      - name: postgres
        image: postgres:16
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: pg
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: nextcloud-db
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: nextcloud-db
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-db
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: pgdata
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
      terminationGracePeriodSeconds: 30
  volumeClaimTemplates:
  - metadata:
      name: pgdata
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: nextcloud
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: @{config_values.postgres_storage_size}
