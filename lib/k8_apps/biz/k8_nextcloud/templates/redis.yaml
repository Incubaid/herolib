apiVersion: v1
kind: Service
metadata:
  name: @{config_values.redis_host}
  namespace: @{config_values.namespace}
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: nextcloud
spec:
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: nextcloud
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: @{config_values.redis_host}
  namespace: @{config_values.namespace}
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/part-of: nextcloud
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: nextcloud
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        args: ["--save", "", "--appendonly", "no"]
        ports:
        - containerPort: 6379
          name: redis
        resources:
          requests:
            cpu: "20m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
