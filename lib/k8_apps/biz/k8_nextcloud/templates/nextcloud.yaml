apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nextcloud-data
  namespace: @{config_values.namespace}
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: nextcloud
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: @{config_values.nextcloud_storage_size}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nextcloud-php-overrides
  namespace: @{config_values.namespace}
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: nextcloud
data:
  zz-php.ini: |
    memory_limit=512M
    upload_max_filesize=2G
    post_max_size=2G
    opcache.enable=1
    opcache.enable_cli=1
    opcache.interned_strings_buffer=16
    opcache.max_accelerated_files=10000
    opcache.memory_consumption=128
    opcache.save_comments=1
    opcache.revalidate_freq=1
---
apiVersion: v1
kind: Service
metadata:
  name: nextcloud-web
  namespace: @{config_values.namespace}
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: nextcloud
    app.kubernetes.io/component: web
spec:
  selector:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: nextcloud
    app.kubernetes.io/component: web
  ports:
  - name: http
    port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: @{config_values.namespace}
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nextcloud
      app.kubernetes.io/part-of: nextcloud
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nextcloud
        app.kubernetes.io/part-of: nextcloud
        app.kubernetes.io/component: web
    spec:
      securityContext:
        fsGroup: 33
        fsGroupChangePolicy: Always
      containers:
      - name: nextcloud
        image: nextcloud:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
        env:
        - name: NEXTCLOUD_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: nextcloud-admin
              key: NEXTCLOUD_ADMIN_USER
        - name: NEXTCLOUD_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-admin
              key: NEXTCLOUD_ADMIN_PASSWORD
        - name: POSTGRES_HOST
          value: @{config_values.postgres_host}
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: nextcloud-db
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: nextcloud-db
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: nextcloud-db
              key: POSTGRES_PASSWORD
        - name: REDIS_HOST
          value: @{config_values.redis_host}
        - name: NEXTCLOUD_TRUSTED_DOMAINS
          value: @{config_values.fqdn}
        - name: OVERWRITEHOST
          value: @{config_values.fqdn}
        - name: OVERWRITEPROTOCOL
          value: https
        - name: OVERWRITECLIURL
          value: https://@{config_values.fqdn}
        readinessProbe:
          httpGet:
            path: /status.php
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 12
        livenessProbe:
          httpGet:
            path: /status.php
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 10
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "2000m"
            memory: "2Gi"
        volumeMounts:
        - name: nextcloud-data
          mountPath: /var/www/html
        - name: php-overrides
          mountPath: /usr/local/etc/php/conf.d/zz-php.ini
          subPath: zz-php.ini
      volumes:
      - name: nextcloud-data
        persistentVolumeClaim:
          claimName: nextcloud-data
      - name: php-overrides
        configMap:
          name: nextcloud-php-overrides
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nextcloud
  namespace: @{config_values.namespace}
spec:
  ingressClassName: traefik
  rules:
  - host: @{config_values.fqdn}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nextcloud-web
            port:
              number: 80
